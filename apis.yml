name: P&N Bank
kind: company
description: P&N Bank is the retail banking brand of Police & Nurses Limited (ABN
  69 087 651 876, AFSL/Australian Credit Licence 240701), a customer-owned (mutual)
  bank owned by its members rather than shareholders and one of Western Australia's
  largest locally based banks, headquartered in Perth. It grew out of the Police &
  Nurses Credit Society and today sits within the broader P&N Group, which also operates
  the bcu brand on the New South Wales / Queensland east coast, offering everyday
  transaction and savings accounts, term deposits, home and personal loans, credit
  cards, and insurance. As an Authorised Deposit-taking Institution (ADI) it participates
  in Australia's Consumer Data Right (CDR / Open Banking), exposing a public, unauthenticated
  Product Reference Data (PRD) API built to the Data Standards Body (DSB) Consumer
  Data Standards; consumer data sharing beyond product reference data requires accredited
  data recipient status and the CDR OAuth2/OIDC FAPI authorization model.
