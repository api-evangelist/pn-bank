      summary: Get Account Balance
      tags:
      - Banking Account Balances
      x-scopes:
      - bank:accounts.basic:read
      x-version: '1'
components:
  schemas:
    ErrorV2_meta:
      description: Additional data for customised error codes.
      properties:
        urn:
          description: The CDR error code URN which the application-specific error code extends. Mandatory if the error _code_ is an application-specific error rather than a standardised error code.
          type: string
      type: object
      x-conditional:
      - urn
    BankingBalance:
      example:
        accountId: ''
        purses:
        - amount: amount
          currency: currency
        - amount: amount
          currency: currency
        amortisedLimit: '0.00'
        currentBalance: currentBalance
        creditLimit: '0.00'
        currency: AUD
        availableBalance: availableBalance
      properties:
        accountId:
          allOf:
          - $ref: '#/components/schemas/BankingAccountId'
          description: Unique identifier for the account.
        currentBalance:
          description: The balance of the account at this time. Should align to the balance available via other channels such as Internet Banking. Assumed to be negative if the customer has money owing.
          type: string
          x-cds-type: AmountString
        availableBalance:
          description: Balance representing the amount of funds available for transfer. Assumed to be zero or positive.
          type: string
          x-cds-type: AmountString
        creditLimit:
          default: '0.00'
          description: Object representing the maximum amount of credit that is available for this account. Assumed to be zero if absent.
          type: string
          x-cds-type: AmountString
        amortisedLimit:
          default: '0.00'
          description: Object representing the available limit amortised according to payment schedule. Assumed to be zero if absent.
          type: string
          x-cds-type: AmountString
        currency:
          default: AUD
          description: The currency for the balance amounts. If absent assumed to be `AUD`.
          type: string
          x-cds-type: CurrencyString
        purses:
          description: Optional array of balances for the account in other currencies. Included to support accounts that support multi-currency purses such as Travel Cards.
          items:
            $ref: '#/components/schemas/BankingBalancePurse'
          type: array
      required:
      - accountId
      - availableBalance
      - currentBalance
      type: object
    BankingBalancePurse:
      example:
        amount: amount
        currency: currency
      properties:
        amount:
          description: The balance available for this additional currency purse.
          type: string
          x-cds-type: AmountString
        currency:
          description: The currency for the purse.
          type: string
          x-cds-type: CurrencyString
      required:
      - amount
      type: object
    ResponseBankingAccountsBalanceById:
      example:
        data:
          accountId: ''
          purses:
          - amount: amount
            currency: currency
          - amount: amount
            currency: currency
          amortisedLimit: '0.00'
          currentBalance: currentBalance
          creditLimit: '0.00'
          currency: AUD
          availableBalance: availableBalance
        meta: '{}'
        links:
          self: self
      properties:
        data:
          $ref: '#/components/schemas/BankingBalance'
        links:
          $ref: '#/components/schemas/Links'
        meta:
          type: object
      required:
      - data
      - links
      type: object
    ResponseBankingAccountsBalanceList_data:
      example:
        balances:
        - accountId: ''
          purses:
          - amount: amount
            currency: currency
          - amount: amount
            currency: currency
          amortisedLimit: '0.00'
          currentBalance: currentBalance
          creditLimit: '0.00'
          currency: AUD
          availableBalance: availableBalance
        - accountId: ''
          purses:
          - amount: amount
            currency: currency
          - amount: amount
            currency: currency
          amortisedLimit: '0.00'
          currentBalance: currentBalance
          creditLimit: '0.00'
          currency: AUD
          availableBalance: availableBalance
      properties:
        balances:
          description: The list of balances returned.
          items:
            $ref: '#/components/schemas/BankingBalance'
          type: array
      required:
      - balances
      type: object
    ResponseErrorListV2:
      properties:
        errors:
          description: List of errors.
          items:
            $ref: '#/components/schemas/ErrorV2'
          type: array
      required:
      - errors
      type: object
    RequestAccountIdListV1_data:
      example:
        accountIds:
        - null
        - null
      properties:
        accountIds:
          description: Array of _accountId_ values to obtain data for.
          items:
            $ref: '#/components/schemas/BankingAccountId'
          type: array
      required:
      - accountIds
      type: object
    MetaPaginated:
      example:
        totalRecords: 0
        totalPages: 6
      properties:
        totalRecords:
          description: The total number of records in the full set. See [pagination](#pagination).
          type: integer
          x-cds-type: NaturalNumber
        totalPages:
          description: The total number of pages in the full set. See [pagination](#pagination).
          type: integer
          x-cds-type: NaturalNumber
      required:
      - totalPages
      - totalRecords
      type: object
    RequestAccountIdListV1:
      example:
        data:
          accountIds:
          - null
          - null
        meta: '{}'
      properties:
        data:
          $ref: '#/components/schemas/RequestAccountIdListV1_data'
        meta:
          type: object
      required:
      - data
      type: object
    ErrorV2:
      properties:
        code:
          description: The code of the error encountered. Where the error is specific to the respondent, an application-specific error code, expressed as a string value. If the error is application-specific, the URN code that the specific error extends must be provided in the _meta_ object. Otherwise, the value is the error code URN.
          type: string
        title:
          description: A short, human-readable summary of the problem that **MUST NOT** change from occurrence to occurrence of the problem represented by the error code.
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          type: string
        meta:
          $ref: '#/components/schemas/ErrorV2_meta'
      required:
      - code
      - detail
      - title
      type: object
      x-conditional:
      - meta
    ResponseBankingAccountsBalanceList:
      example:
        data:
          balances:
          - accountId: ''
            purses:
            - amount: amount
              currency: currency
            - amount: amount
              currency: currency
            amortisedLimit: '0.00'
            currentBalance: currentBalance
            creditLimit: '0.00'
            currency: AUD
            availableBalance: availableBalance
          - accountId: ''
            purses:
            - amount: amount
              currency: currency
            - amount: amount
              currency: currency
            amortisedLimit: '0.00'
            currentBalance: currentBalance
            creditLimit: '0.00'
            currency: AUD
            availableBalance: availableBalance
        meta:
          totalRecords: 0
          totalPages: 6
        links:
          next: next
          last: last
          prev: prev
          self: self
          first: first
      properties:
        data:
          $ref: '#/components/schemas/ResponseBankingAccountsBalanceList_data'
        links:
          $ref: '#/components/schemas/LinksPaginated'
        meta:
          $ref: '#/components/schemas/MetaPaginated'
      required:
      - data
      - links
      - meta
      type: object
    Links:
      example:
        self: self
      properties:
        self:
          description: Fully qualified link that generated the current response document.
          type: string
          x-cds-type: URIString
      required:
      - self
      type: object
    BankingProductCategoryV2:
      description: The category to which a product or account belongs. See [here](#product-categories) for more details.
      enum:
      - BUSINESS_LOANS
      - BUY_NOW_PAY_LATER
      - CRED_AND_CHRG_CARDS
      - LEASES
      - MARGIN_LOANS
      - OVERDRAFTS
      - PERS_LOANS
      - REGULATED_TRUST_ACCOUNTS
      - RESIDENTIAL_MORTGAGES
      - TERM_DEPOSITS
      - TRADE_FINANCE
      - TRANS_AND_SAVINGS_ACCOUNTS
      - TRAVEL_CARDS
      type: string
    BankingAccountId:
      description: A unique identifier for a Banking account, generated according to [CDR ID Permanence](#id-permanence) requirements.
      type: string
      x-cds-type: ASCIIString
    LinksPaginated:
